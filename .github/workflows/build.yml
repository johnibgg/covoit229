# Compile l'APK Android de Covoit229 et le publie en Release GitHub
# (lien public téléchargeable directement sur un téléphone).
name: build-apk
on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Générer la coque Android
        run: |
          flutter create --org bj.covoit --project-name covoit229 --platforms android shell_app
          rm -rf shell_app/lib shell_app/test shell_app/pubspec.yaml
          cp -r lib shell_app/lib
          cp pubspec.yaml shell_app/pubspec.yaml
          M=shell_app/android/app/src/main/AndroidManifest.xml
          # Permission Internet (indispensable en release) + nom affiché de l'appli
          sed -i 's#<application#<uses-permission android:name="android.permission.INTERNET"/>\n    <application#' "$M"
          sed -i 's/android:label="covoit229"/android:label="Covoit229"/' "$M"

      - name: Compiler l'APK
        run: |
          cd shell_app
          flutter pub get
          flutter build apk --release
          ls -la build/app/outputs/flutter-apk/

      - name: Publier l'APK (Release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="apk-${{ github.run_number }}"
          cp shell_app/build/app/outputs/flutter-apk/app-release.apk Covoit229.apk
          gh release create "$TAG" Covoit229.apk \
            --title "Covoit229 — build #${{ github.run_number }}" \
            --notes "APK Android généré automatiquement. Télécharge Covoit229.apk et installe-le." \
            || gh release upload "$TAG" Covoit229.apk --clobber

  # Version web (pour iPhone : Safari → « Ajouter à l'écran d'accueil »)
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Compiler la version web
        run: |
          flutter create --org bj.covoit --project-name covoit229 --platforms web shell_web
          rm -rf shell_web/lib shell_web/test shell_web/pubspec.yaml
          cp -r lib shell_web/lib
          cp pubspec.yaml shell_web/pubspec.yaml
          sed -i 's/covoit229/Covoit229/g' shell_web/web/index.html shell_web/web/manifest.json || true
          cd shell_web
          flutter pub get
          flutter build web --release --base-href /covoit229/

      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: shell_web/build/web
