# Compile l'APK Android de Covoit229 et le publie en Release GitHub
# (lien public téléchargeable directement sur un téléphone).
name: build-apk
on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Générer la coque Android
        run: |
          flutter create --org bj.covoit --project-name covoit229 --platforms android shell_app
          rm -rf shell_app/lib shell_app/test shell_app/pubspec.yaml
          cp -r lib shell_app/lib
          cp pubspec.yaml shell_app/pubspec.yaml
          M=shell_app/android/app/src/main/AndroidManifest.xml
          # Permission Internet (indispensable en release) + nom affiché de l'appli
          sed -i 's#<application#<uses-permission android:name="android.permission.INTERNET"/>\n    <application#' "$M"
          sed -i 's/android:label="covoit229"/android:label="Covoit229"/' "$M"

      - name: Compiler l'APK
        run: |
          cd shell_app
          flutter pub get
          flutter build apk --release
          ls -la build/app/outputs/flutter-apk/

      - name: Publier l'APK (Release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="apk-${{ github.run_number }}"
          cp shell_app/build/app/outputs/flutter-apk/app-release.apk Covoit229.apk
          gh release create "$TAG" Covoit229.apk \
            --title "Covoit229 — build #${{ github.run_number }}" \
            --notes "APK Android généré automatiquement. Télécharge Covoit229.apk et installe-le." \
            || gh release upload "$TAG" Covoit229.apk --clobber

  # Version web (pour iPhone : Safari → « Ajouter à l'écran d'accueil »)
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Compiler la version web
        run: |
          flutter create --org bj.covoit --project-name covoit229 --platforms web shell_web
          rm -rf shell_web/lib shell_web/test shell_web/pubspec.yaml
          cp -r lib shell_web/lib
          cp pubspec.yaml shell_web/pubspec.yaml
          sed -i 's/covoit229/Covoit229/g' shell_web/web/index.html shell_web/web/manifest.json || true
          # Icônes personnalisées (écran d'accueil iPhone/Android + favicon)
          cp webicons/Icon-192.png shell_web/web/icons/Icon-192.png
          cp webicons/Icon-512.png shell_web/web/icons/Icon-512.png
          cp webicons/Icon-192.png shell_web/web/icons/Icon-maskable-192.png
          cp webicons/Icon-512.png shell_web/web/icons/Icon-maskable-512.png
          cp webicons/favicon.png shell_web/web/favicon.png
          cp webicons/apple-touch-icon.png shell_web/web/apple-touch-icon.png
          # Couleurs PWA + écran de démarrage animé (fini la page blanche)
          python3 - << 'PYEOF'
          import re
          p = 'shell_web/web/index.html'
          html = open(p).read()
          html = html.replace('</head>', '<link rel="apple-touch-icon" href="apple-touch-icon.png"><meta name="theme-color" content="#0A1B2E"></head>')
          splash = (
            '<div id="cv-splash" style="position:fixed;inset:0;background:#0A1B2E;'
            'display:flex;flex-direction:column;align-items:center;justify-content:center;'
            'z-index:9999;transition:opacity .4s">'
            '<img src="icons/Icon-192.png" width="88" height="88" style="border-radius:24px;'
            'box-shadow:0 12px 40px rgba(0,210,75,.45)">'
            '<div style="color:#fff;font-family:sans-serif;font-size:26px;font-weight:800;'
            'margin-top:16px">Covoit229</div>'
            '<div style="color:rgba(255,255,255,.55);font-family:sans-serif;font-size:13px;'
            'margin-top:6px">On partage la route, on partage les frais</div>'
            '<div style="margin-top:22px;width:32px;height:32px;'
            'border:3px solid rgba(255,255,255,.2);border-top-color:#00D24B;border-radius:50%;'
            'animation:cvspin 1s linear infinite"></div>'
            '<style>@keyframes cvspin{to{transform:rotate(360deg)}}</style>'
            '<script>window.addEventListener("flutter-first-frame",function(){'
            'var e=document.getElementById("cv-splash");if(e){e.style.opacity="0";'
            'setTimeout(function(){e.remove()},450)}});</script>'
            '</div>'
          )
          html = html.replace('<body>', '<body>' + splash)
          open(p, 'w').write(html)
          m = 'shell_web/web/manifest.json'
          mj = open(m).read()
          mj = re.sub(r'"theme_color":\s*"[^"]*"', '"theme_color": "#0A1B2E"', mj)
          mj = re.sub(r'"background_color":\s*"[^"]*"', '"background_color": "#0A1B2E"', mj)
          open(m, 'w').write(mj)
          print('index.html + manifest patches ok')
          PYEOF
          cd shell_web
          flutter pub get
          flutter build web --release --base-href /covoit229/

      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: shell_web/build/web
